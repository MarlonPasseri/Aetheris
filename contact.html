<style>
        body { background-color: #050505; color: #e5e2e1; -webkit-font-smoothing: antialiased; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-panel:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.05);
        }
        .glow-cyan { text-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
        .grid-bg {
            background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .action-button { 
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .action-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .action-button:hover::before { left: 100%; }
        .metatron-bg {
            animation: rotate 60s linear infinite;
            opacity: 0.05;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .floating-light {
            filter: blur(100px);
            border-radius: 50%;
            position: absolute;
            z-index: 0;
            pointer-events: none;
        }
        .editorial-spacing { letter-spacing: 0.15em; text-transform: uppercase; }
    </style>

<div class="flex items-center gap-8">
<div class="hidden sm:flex gap-6 text-zinc-500">
<button 
  id="languageToggle"
  type="button"
  class="flex items-center gap-2 text-zinc-500 hover:text-primary-container transition-colors"
>
  <span class="material-symbols-outlined text-sm">language</span>
  <span id="languageLabel" class="font-['Space_Grotesk'] text-[9px] tracking-[0.2em] uppercase">PT</span>
</button>

<a href="contact.html">
  <button class="bg-white text-black font-['Space_Grotesk'] font-bold text-[9px] tracking-[0.2em] uppercase px-8 py-3 action-button hover:bg-primary-container transition-all">
    Entre em Contato
  </button>
</a>

<main class="pt-[110px] bg-surface min-h-screen">
  <section class="relative min-h-[calc(100vh-110px)] py-16 overflow-hidden grid-bg">

    <div class="container mx-auto px-6 relative z-10">

      <div class="text-center mb-12">
        <span class="text-primary-container font-label-caps editorial-spacing mb-6 block">
          &lt; Vamos trabalhar juntos /&gt;
        </span>

        <h1 class="font-h2 text-[2.6rem] leading-tight text-on-background max-w-4xl mx-auto">
          Preencha os dados para contar <br/>
          <span class="text-primary-container glow-cyan">
            como podemos ajudar seu negócio
          </span>
        </h1>
      </div>

      <form 
        action="https://formspree.io/f/mjgjllza" 
        method="POST"
        class="glass-panel max-w-[560px] mx-auto p-10 md:p-12 border-primary-container/20"
      >
        <div class="flex flex-col gap-5">

          <div>
            <label class="block mb-2 font-['Inter'] text-sm font-semibold text-on-surface">
              Nome
            </label>
            <input 
              class="bg-white/5 border border-white/10 px-6 py-4 text-white focus:outline-none focus:border-primary-container w-full font-['Inter'] text-sm placeholder:text-zinc-600 transition-all rounded-full"
              placeholder="Ex: Pedro da Silva"
              type="text"
              name="name"
              required
            />
          </div>

          <div>
            <label class="block mb-2 font-['Inter'] text-sm font-semibold text-on-surface">
              Empresa <span class="text-on-surface-variant">(se houver)</span>
            </label>
            <input 
              class="bg-white/5 border border-white/10 px-6 py-4 text-white focus:outline-none focus:border-primary-container w-full font-['Inter'] text-sm placeholder:text-zinc-600 transition-all rounded-full"
              placeholder="Ex: Loja do Pedro"
              type="text"
              name="company"
            />
          </div>

          <div>
            <label class="block mb-2 font-['Inter'] text-sm font-semibold text-on-surface">
              Email
            </label>
            <input 
              class="bg-white/5 border border-white/10 px-6 py-4 text-white focus:outline-none focus:border-primary-container w-full font-['Inter'] text-sm placeholder:text-zinc-600 transition-all rounded-full"
              placeholder="Ex: pedro@lojapedro.com"
              type="email"
              name="email"
              required
            />
          </div>

          <div>
            <label class="block mb-2 font-['Inter'] text-sm font-semibold text-on-surface">
              Telefone
            </label>
            <input 
              class="bg-white/5 border border-white/10 px-6 py-4 text-white focus:outline-none focus:border-primary-container w-full font-['Inter'] text-sm placeholder:text-zinc-600 transition-all rounded-full"
              placeholder="+55 (00) 00000-0000"
              type="tel"
              name="phone"
            />
          </div>

          <div>
            <label class="block mb-2 font-['Inter'] text-sm font-semibold text-on-surface">
              Descreva a oportunidade de negócios ou o problema que deseja resolver
            </label>
            <textarea 
              class="bg-white/5 border border-white/10 px-6 py-4 text-white focus:outline-none focus:border-primary-container w-full font-['Inter'] text-sm placeholder:text-zinc-600 transition-all rounded-[28px] resize-none"
              placeholder="Ex: Preciso implementar uma plataforma de gestão na minha empresa e fazer um app de logística..."
              name="message"
              rows="4"
              required
            ></textarea>
          </div>

          <label class="flex items-start gap-3 text-on-surface-variant font-['Inter'] text-sm">
            <input 
              type="checkbox" 
              name="privacy"
              required
              class="mt-1 bg-transparent border-white/20 text-primary-container focus:ring-primary-container"
            />
            <span>
              Aceito a Política de Privacidade da Aetheris e compartilhar as informações.
            </span>
          </label>

          <input type="text" name="_gotcha" style="display:none">

          <button 
            type="submit"
            class="mt-2 rounded-full bg-primary-container text-on-primary px-12 py-5 font-label-caps text-label-caps action-button shadow-[0_0_30px_rgba(0,240,255,0.2)] hover:shadow-[0_0_50px_rgba(0,240,255,0.4)]"
          >
            Enviar
          </button>

        </div>
      </form>

    </div>
  </section>
</main>
